<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Background -->
  <rect x="0" y="0" width="600" height="400" fill="#f5f6fa" rx="20" ry="20" />
  
  <!-- Video player -->
  <rect x="100" y="80" width="400" height="240" fill="#1a1d24" rx="10" ry="10" />
  
  <!-- Play button -->
  <circle cx="300" cy="200" r="40" fill="#ff4757" />
  <polygon points="290,180 290,220 320,200" fill="white" />
  
  <!-- Transcript lines -->
  <rect x="150" y="340" width="300" height="10" fill="#dfe4ea" rx="5" ry="5" />
  <rect x="150" y="360" width="250" height="10" fill="#dfe4ea" rx="5" ry="5" />
  <rect x="150" y="380" width="200" height="10" fill="#dfe4ea" rx="5" ry="5" />
  
  <!-- Summary highlight effect -->
  <rect x="120" y="100" width="360" height="30" fill="#ff475733" rx="5" ry="5" />
  <rect x="120" y="140" width="320" height="30" fill="#ff475733" rx="5" ry="5" />
  <rect x="120" y="180" width="360" height="30" fill="#ff475733" rx="5" ry="5" />
  <rect x="120" y="220" width="340" height="30" fill="#ff475733" rx="5" ry="5" />
  <rect x="120" y="260" width="290" height="30" fill="#ff475733" rx="5" ry="5" />
  
  <!-- Magnifying glass -->
  <circle cx="470" cy="40" r="25" fill="none" stroke="#2e86de" stroke-width="8" />
  <line x1="490" y1="60" x2="510" y2="80" stroke="#2e86de" stroke-width="8" stroke-linecap="round" />
  
  <!-- AI brain icon -->
  <circle cx="50" cy="40" r="30" fill="#ff4757" />
  <path d="M35,40 C35,30 65,30 65,40 C65,55 35,55 35,40 Z" fill="#ff4757" />
  <circle cx="43" cy="35" r="3" fill="white" />
  <circle cx="57" cy="35" r="3" fill="white" />
  <path d="M40,45 C45,50 55,50 60,45" fill="none" stroke="white" stroke-width="2" />
  <path d="M50,25 L50,15 M40,20 L30,10 M60,20 L70,10" fill="none" stroke="#ff4757" stroke-width="3" />
</svg> 