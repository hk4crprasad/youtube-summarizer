<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-8021347991590495">
    <title>Register - YouTube Summarizer</title>
    <link rel="icon" href="{{ url_for('static', filename='yt.svg') }}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8021347991590495"
     crossorigin="anonymous"></script>
    
    <script async custom-element="amp-auto-ads"
        src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js">
    </script>
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #2e86de;
            --dark-color: #2f3542;
            --light-color: #f5f6fa;
            --card-bg: #ffffff;
            --body-bg: #f5f6fa;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        [data-theme="dark"] {
            --primary-color: #ff6b81;
            --secondary-color: #54a0ff;
            --dark-color: #1e272e;
            --light-color: #d2dae2;
            --card-bg: #2a303c;
            --body-bg: #1a1d24;
            --text-color: #e2e8f0;
            --border-color: #3f4756;
            --box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--body-bg);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .register-container {
            max-width: 550px;
            margin: 3rem auto;
            padding: 2rem;
        }

        .card {
            border: none;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            background-color: var(--card-bg);
        }

        .card-header {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            padding: 1rem;
            border-top-left-radius: var(--border-radius);
            border-top-right-radius: var(--border-radius);
            text-align: center;
        }

        .form-control {
            background-color: var(--body-bg);
            border-color: var(--border-color);
            color: var(--text-color);
            padding: 0.8rem;
        }

        .form-control:focus {
            background-color: var(--body-bg);
            color: var(--text-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(255, 71, 87, 0.25);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 0.8rem;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #e84118;
            border-color: #e84118;
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--box-shadow);
        }

        .login-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: var(--border-radius);
        }

        .password-strength {
            height: 5px;
            border-radius: 2px;
            margin-top: 5px;
        }

        .weak {
            background-color: #e84118;
            width: 30%;
        }

        .medium {
            background-color: #ffa502;
            width: 60%;
        }

        .strong {
            background-color: #4cd137;
            width: 100%;
        }
    </style>
</head>
<body>
    <amp-auto-ads type="adsense"
        data-ad-client="ca-pub-8021347991590495">
    </amp-auto-ads>
    <div class="theme-toggle" id="theme-toggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="container register-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} mb-3">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="card">
            <div class="card-header">
                <h3 class="m-0"><i class="fa-brands fa-youtube me-2" style="color: #ffffff;"></i>Create Account</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('register') }}" id="register-form">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="password-strength" id="password-strength"></div>
                        <small id="password-feedback" class="form-text text-muted"></small>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                        <div id="password-match-feedback" class="form-text"></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" id="submit-btn">Register</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}" class="login-link">Login</a></p>
                <p class="mb-0 mt-2"><a href="{{ url_for('index') }}" class="login-link">Back to Home</a></p>
            </div>
        </div>
    </div>

    <!-- Ad container below registration form -->
    <div class="container my-4 ad-container">
        <ins class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-8021347991590495"
            data-ad-slot="register-bottom"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = themeToggle.querySelector('i');
            
            // Check for saved theme preference or system preference
            const savedTheme = localStorage.getItem('theme');
            
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.className = 'fas fa-sun';
            }
            
            // Theme toggle button
            themeToggle.addEventListener('click', function() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                
                themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            });

            // Password strength checker
            const passwordInput = document.getElementById('password');
            const passwordStrength = document.getElementById('password-strength');
            const passwordFeedback = document.getElementById('password-feedback');
            const confirmPasswordInput = document.getElementById('confirm_password');
            const passwordMatchFeedback = document.getElementById('password-match-feedback');
            const submitBtn = document.getElementById('submit-btn');
            const registerForm = document.getElementById('register-form');

            passwordInput.addEventListener('input', function() {
                const password = this.value;
                let strength = 0;
                let feedback = '';

                if (password.length >= 8) {
                    strength += 1;
                } else {
                    feedback = 'Password should be at least 8 characters long';
                }

                if (/[A-Z]/.test(password)) {
                    strength += 1;
                } else if (password.length > 0) {
                    feedback = feedback || 'Add uppercase letters';
                }

                if (/[0-9]/.test(password)) {
                    strength += 1;
                } else if (password.length > 0) {
                    feedback = feedback || 'Add numbers';
                }

                if (/[^A-Za-z0-9]/.test(password)) {
                    strength += 1;
                } else if (password.length > 0) {
                    feedback = feedback || 'Add special characters';
                }

                // Update the strength indicator
                passwordStrength.className = 'password-strength';
                if (password.length === 0) {
                    passwordStrength.style.width = '0';
                    passwordFeedback.textContent = '';
                } else if (strength <= 2) {
                    passwordStrength.classList.add('weak');
                    passwordFeedback.textContent = feedback || 'Weak password';
                    passwordFeedback.style.color = '#e84118';
                } else if (strength === 3) {
                    passwordStrength.classList.add('medium');
                    passwordFeedback.textContent = feedback || 'Medium strength password';
                    passwordFeedback.style.color = '#ffa502';
                } else {
                    passwordStrength.classList.add('strong');
                    passwordFeedback.textContent = 'Strong password';
                    passwordFeedback.style.color = '#4cd137';
                }

                checkPasswordsMatch();
            });

            confirmPasswordInput.addEventListener('input', checkPasswordsMatch);

            function checkPasswordsMatch() {
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (confirmPassword.length === 0) {
                    passwordMatchFeedback.textContent = '';
                    return;
                }

                if (password === confirmPassword) {
                    passwordMatchFeedback.textContent = 'Passwords match';
                    passwordMatchFeedback.style.color = '#4cd137';
                    submitBtn.disabled = false;
                } else {
                    passwordMatchFeedback.textContent = 'Passwords do not match';
                    passwordMatchFeedback.style.color = '#e84118';
                    submitBtn.disabled = true;
                }
            }

            registerForm.addEventListener('submit', function(e) {
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (password !== confirmPassword) {
                    e.preventDefault();
                    passwordMatchFeedback.textContent = 'Passwords do not match';
                    passwordMatchFeedback.style.color = '#e84118';
                }
                
                // API registration option
                // Uncomment this block to use API registration instead of form submission
                /*
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = passwordInput.value;
                
                fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        // Show error
                        const alertBox = document.createElement('div');
                        alertBox.className = 'alert alert-danger';
                        alertBox.textContent = data.error;
                        registerForm.prepend(alertBox);
                    } else {
                        // Store tokens
                        auth.setTokens(data.access_token, data.refresh_token, data.expires_in);
                        
                        // Redirect to dashboard
                        window.location.href = '/dashboard';
                    }
                })
                .catch(error => {
                    console.error('Registration failed:', error);
                });
                */
            });
        });
    </script>
</body>
</html>
